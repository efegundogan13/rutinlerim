<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutinlerim Logo Generator</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .logo-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .logo-preview {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        .logo-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        button {
            background: #6B73FF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #5561DD;
        }
        
        /* Logo Stilleri */
        .logo1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .logo2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .logo3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .logo4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .logo5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .logo6 { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
        
        .emoji-large {
            font-size: 80px;
            line-height: 1;
        }
        .emoji-combo {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .emoji-bg {
            font-size: 100px;
            opacity: 0.3;
            position: absolute;
        }
        .emoji-fg {
            font-size: 60px;
            position: relative;
            z-index: 2;
        }
        .circular-text {
            position: absolute;
            width: 160px;
            height: 160px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
        }
        .rotation-icon {
            position: absolute;
            font-size: 50px;
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Rutinlerim Logo Seçenekleri</h1>
        
        <div class="logo-grid">
            <!-- Logo 1: Büyük Döngü Okları -->
            <div class="logo-card">
                <div class="logo-preview logo1">
                    <div class="emoji-large">🔄</div>
                </div>
                <div class="logo-name">Döngü</div>
                <p>Tekrarlayan rutinler</p>
                <button onclick="downloadLogo('logo1', '🔄')">İndir (1024x1024)</button>
            </div>

            <!-- Logo 2: Takvim -->
            <div class="logo-card">
                <div class="logo-preview logo2">
                    <div class="emoji-large">📅</div>
                </div>
                <div class="logo-name">Takvim</div>
                <p>Planlı takip</p>
                <button onclick="downloadLogo('logo2', '📅')">İndir (1024x1024)</button>
            </div>

            <!-- Logo 3: Onay İşareti -->
            <div class="logo-card">
                <div class="logo-preview logo3">
                    <div class="emoji-large">✅</div>
                </div>
                <div class="logo-name">Tamamla</div>
                <p>Görev tamamlama</p>
                <button onclick="downloadLogo('logo3', '✅')">İndir (1024x1024)</button>
            </div>

            <!-- Logo 4: Liste -->
            <div class="logo-card">
                <div class="logo-preview logo4">
                    <div class="emoji-large">�</div>
                </div>
                <div class="logo-name">Liste</div>
                <p>Yapılacaklar listesi</p>
                <button onclick="downloadLogo('logo4', '📋')">İndir (1024x1024)</button>
            </div>

            <!-- Logo 5: Alarm/Hatırlatıcı -->
            <div class="logo-card">
                <div class="logo-preview logo5">
                    <div class="emoji-large">⏰</div>
                </div>
                <div class="logo-name">Alarm</div>
                <p>Zamanında hatırlat</p>
                <button onclick="downloadLogo('logo5', '⏰')">İndir (1024x1024)</button>
            </div>

            <!-- Logo 6: Yıldız/Başarı -->
            <div class="logo-card">
                <div class="logo-preview logo6">
                    <div class="emoji-large">⭐</div>
                </div>
                <div class="logo-name">Başarı</div>
                <p>Rutin başarısı</p>
                <button onclick="downloadLogo('logo6', '⭐')">İndir (1024x1024)</button>
            </div>
        </div>
    </div>

    <script>
        function downloadLogo(logoClass, emoji) {
            // Canvas oluştur
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // Gradient oluştur
            let gradient;
            switch(logoClass) {
                case 'logo1':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#667eea');
                    gradient.addColorStop(1, '#764ba2');
                    break;
                case 'logo2':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#f093fb');
                    gradient.addColorStop(1, '#f5576c');
                    break;
                case 'logo3':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#4facfe');
                    gradient.addColorStop(1, '#00f2fe');
                    break;
                case 'logo4':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#43e97b');
                    gradient.addColorStop(1, '#38f9d7');
                    break;
                case 'logo5':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#fa709a');
                    gradient.addColorStop(1, '#fee140');
                    break;
                case 'logo6':
                    gradient = ctx.createLinearGradient(0, 0, 1024, 1024);
                    gradient.addColorStop(0, '#30cfd0');
                    gradient.addColorStop(1, '#330867');
                    break;
            }

            // Arka plan
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 1024, 1024);

            // Emoji çiz - merkeze ve büyük
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 600px Arial';
            ctx.fillText(emoji, 512, 512);

            // İndir
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'rutinlerim-icon-1024.png';
                a.click();
                URL.revokeObjectURL(url);
            });
        }
    </script>
</body>
</html>
