<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B73FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners (iOS app icon style) -->
  <rect width="1024" height="1024" rx="225" ry="225" fill="url(#bgGradient)"/>
  
  <!-- House icon - simple geometric -->
  <g transform="translate(512, 512)">
    <!-- House roof (triangle) -->
    <path d="M -150 -50 L 0 -180 L 150 -50 Z" fill="white"/>
    
    <!-- House body (rectangle) -->
    <rect x="-120" y="-50" width="240" height="220" fill="white"/>
    
    <!-- Door -->
    <rect x="-40" y="50" width="80" height="120" fill="#6B73FF" rx="5"/>
    
    <!-- Window left -->
    <rect x="-90" y="-20" width="50" height="50" fill="#6B73FF" rx="5"/>
    
    <!-- Window right -->
    <rect x="40" y="-20" width="50" height="50" fill="#6B73FF" rx="5"/>
  </g>
  
  <!-- Cycle/refresh icon (top right) -->
  <g transform="translate(750, 274)">
    <!-- Circular arrow -->
    <path d="M 0 -60 A 60 60 0 1 1 42 42" 
          fill="none" 
          stroke="rgba(255,255,255,0.9)" 
          stroke-width="12" 
          stroke-linecap="round"/>
    
    <!-- Arrow head -->
    <path d="M 42 42 L 60 25 L 25 60" 
          fill="none" 
          stroke="rgba(255,255,255,0.9)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- App name (optional, subtle) -->
  <text x="512" y="900" 
        font-family="Arial, sans-serif" 
        font-size="42" 
        font-weight="600" 
        text-anchor="middle" 
        fill="rgba(255,255,255,0.8)">EvRutini</text>
</svg>